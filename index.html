<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>2式同時・自動計算ツール</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.0.1/tesseract.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
    body { background-color: #020b14; color: #ffffff; width: 100vw; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* 上半分：カメラ映像（余計な枠はなし） */
    .camera-area { position: relative; width: 100%; height: 50vh; background: #000; }
    #camera-video { width: 100%; height: 100%; object-fit: cover; }
    #sys-status { position: absolute; top: 10px; left: 10px; padding: 6px 12px; background: rgba(0,0,0,0.8); border-radius: 4px; font-size: 0.8rem; border: 1px solid #00d2ff; }

    /* 下半分：計算結果モニター */
    .control-panel { height: 50vh; background: #0a192f; border-top: 3px solid #00d2ff; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
    
    .btn-area { width: 100%; height: 60px; }
    .scan-btn { width: 100%; height: 100%; background: #007bff; border: 2px solid #fff; border-radius: 8px; color: #fff; font-size: 1.3rem; font-weight: bold; cursor: pointer; }
    .scan-btn.active { background: #dc3545; }

    /* 左右の計算結果をデカデカと表示するエリア */
    .calc-boxes { flex: 1; display: flex; gap: 15px; }
    .result-box { flex: 1; background: rgba(0,0,0,0.4); border: 2px solid #334e68; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .result-box.detected { border-color: #00ffcc; background: rgba(0, 255, 204, 0.05); }
    
    .box-label { font-size: 0.9rem; color: #00d2ff; font-weight: bold; margin-bottom: 5px; }
    .detected-formula { font-size: 1.2rem; color: #a0aec0; min-height: 28px; word-break: break-all; text-align: center; }
    .calc-answer { font-size: 2.5rem; font-weight: bold; color: #ffffff; margin-top: 5px; }
    .result-box.detected .calc-answer { color: #00ffcc; text-shadow: 0 0 10px rgba(0,255,204,0.5); }

    #hidden-canvas { display: none; }
  </style>
</head>
<body>

  <div class="camera-area">
    <div id="sys-status" style="color: yellow;">AI起動中...</div>
    <video id="camera-video" autoplay playsinline muted></video>
  </div>

  <div class="control-panel">
    <div class="btn-area">
      <button class="scan-btn" id="main-btn" onclick="toggleScan()" disabled>計算スキャン開始</button>
    </div>

    <div class="calc-boxes">
      <!-- 左側の式と答え -->
      <div class="result-box" id="box-left">
        <div class="box-label">【 左側の式 】</div>
        <div class="detected-formula" id="formula-left">---</div>
        <div class="calc-answer" id="answer-left">-</div>
      </div>

      <!-- 右側の式と答え -->
      <div class="result-box" id="box-right">
        <div class="box-label">【 右側の式 】</div>
        <div class="detected-formula" id="formula-right">---</div>
        <div class="calc-answer" id="answer-right">-</div>
      </div>
    </div>
  </div>

  <canvas id="hidden-canvas"></canvas>

  <script>
    let isScanning = false;
    let timer = null;
    let worker = null;

    async function init() {
      try {
        // OCR設定：完全に「数字」と「計算記号」だけに絞ります。漢字は一切読ませません。
        worker = await Tesseract.createWorker();
        await worker.loadLanguage('eng'); // 漢字を無視するため英語モードにします
        await worker.initialize('eng');
        await worker.setParameters({
          tessedit_char_whitelist: '0123456789+-*/xX= '
        });
        
        document.getElementById('sys-status').textContent = '● スキャン準備完了';
        document.getElementById('sys-status').style.color = '#00ffcc';
        document.getElementById('main-btn').disabled = false;

        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
        document.getElementById('camera-video').srcObject = stream;
      } catch (e) {
        document.getElementById('sys-status').textContent = '❌ 起動エラー';
        document.getElementById('sys-status').style.color = '#ff3366';
      }
    }

    function toggleScan() {
      if (!isScanning) {
        isScanning = true;
        document.getElementById('main-btn').classList.add('active');
        document.getElementById('main-btn').textContent = 'ストップ';
        timer = setInterval(analyzeFormulas, 500);
      } else {
        isScanning = false;
        document.getElementById('main-btn').classList.remove('active');
        document.getElementById('main-btn').textContent = '計算スキャン開始';
        clearInterval(timer);
      }
    }

    // 全角やゲーム特有の記号をプログラムが計算できる形に変換
    function cleanText(str) {
      let res = str.replace(/[０-９]/g, (s) => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
      res = res.replace(/x/gi, '*').replace(/X/g, '*'); // 掛け算
      return res;
    }

    async function analyzeFormulas() {
      const video = document.getElementById('camera-video');
      if (!video.srcObject || video.readyState < 2) return;

      const canvas = document.getElementById('hidden-canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      try {
        const res = await worker.recognize(canvas);
        let raw = res.data.text.replace(/\s+/g, ""); // スペースを詰める
        let cleaned = cleanText(raw);

        // 数式らしき固まり（数字と計算記号）を抽出
        let matches = cleaned.match(/([0-9+\-*/]+)/g) || [];
        // ちゃんと数字が含まれているものだけ残す
        let validFormulas = matches.filter(f => /[0-9]/.test(f) && f.length >= 1);

        if (validFormulas.length >= 2) {
          // 2つの式が見つかったら、自動でストップして計算結果を表示
          toggleScan();

          let leftForm = validFormulas[0];
          let rightForm = validFormulas[1];

          // 数式の評価（末尾にゴミがついている場合は切り落とす）
          if (/[+\-*/]$/.test(leftForm)) leftForm = leftForm.slice(0, -1);
          if (/[+\-*/]$/.test(rightForm)) rightForm = rightForm.slice(0, -1);

          document.getElementById('formula-left').textContent = leftForm;
          document.getElementById('formula-right').textContent = rightForm;

          let leftAns = eval(leftForm);
          let rightAns = eval(rightForm);

          document.getElementById('answer-left').textContent = Math.round(leftAns);
          document.getElementById('answer-right').textContent = Math.round(rightAns);

          document.getElementById('box-left').classList.add('detected');
          document.getElementById('box-right').classList.add('detected');
        } else {
          // 見つからない間は前回のデータをリセットして探し続ける
          document.getElementById('formula-left').textContent = '検索中...';
          document.getElementById('formula-right').textContent = '検索中...';
          document.getElementById('answer-left').textContent = '-';
          document.getElementById('answer-right').textContent = '-';
          document.getElementById('box-left').classList.remove('detected');
          document.getElementById('box-right').classList.remove('detected');
        }
      } catch (e) {
        console.error(e);
      }
    }

    init();
  </script>
</body>
</html>
