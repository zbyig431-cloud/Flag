<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CYBER FLAG ASSISTANT</title>
  <style>
    :root {
      --bg-color: #020b14;
      --panel-bg: #051424;
      --border-color: #00a2ff;
      --text-color: #ffffff;
      --text-muted: #80cfff;
      --shadow-color: rgba(0, 162, 255, 0.4);
      --active-color: #00ffcc;
    }

    * {
      box-sizing: border-box;
      font-family: 'Consolas', 'Courier New', monospace, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* カメラ背景エリア */
    .camera-container {
      position: relative;
      flex: 1;
      background: #000;
      overflow: hidden;
    }

    #camera-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* スキャンターゲット枠（選択したプレイヤーに合わせて動く） */
    .scan-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* 問題文スキャン枠（上部固定） */
    .scan-box-rule {
      position: absolute;
      top: 25%;
      left: 10%;
      width: 80%;
      height: 12%;
      border: 1px dashed var(--border-color);
      box-shadow: 0 0 10px rgba(0, 162, 255, 0.2);
    }
    .scan-box-rule::before {
      content: "SCAN AREA: RULE";
      position: absolute;
      top: -18px;
      left: 5px;
      font-size: 0.65rem;
      color: var(--text-muted);
      background: var(--bg-color);
      padding: 0 4px;
    }

    /* プレイヤースキャン枠（動的） */
    .scan-box-player {
      position: absolute;
      top: 45%;
      width: 28%;
      height: 40%;
      border: 2px solid var(--border-color);
      box-shadow: 0 0 15px var(--shadow-color);
      transition: all 0.3s ease;
    }
    .scan-box-player::before {
      content: "TARGET LOCK";
      position: absolute;
      top: -18px;
      left: 5px;
      font-size: 0.65rem;
      color: var(--active-color);
      background: var(--bg-color);
      padding: 0 4px;
      font-weight: bold;
    }

    /* 各ポジション別の枠位置設定 */
    .pos-clover { left: 4%; }
    .pos-spade { left: 36%; }
    .pos-heart { left: 68%; }


    /* 操作・ナビゲーションパネル（下部固定） */
    .control-panel {
      height: 240px;
      background-color: var(--panel-bg);
      border-top: 2px solid var(--border-color);
      box-shadow: 0 -5px 20px var(--shadow-color);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(0, 162, 255, 0.3);
      padding-bottom: 5px;
    }

    .panel-title {
      font-size: 0.9rem;
      font-weight: bold;
      color: var(--text-muted);
      letter-spacing: 2px;
    }

    /* プレイヤー選択用セグメント */
    .player-selector {
      display: flex;
      border: 1px solid var(--border-color);
      background: #000;
      border-radius: 4px;
      overflow: hidden;
    }
    .player-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 0.85rem;
      padding: 10px 0;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }
    .player-btn:not(:last-child) {
      border-right: 1px solid var(--border-color);
    }
    .player-btn.active {
      background: var(--border-color);
      color: var(--bg-color);
      text-shadow: 0 0 5px rgba(255,255,255,0.5);
    }

    /* メイン表示エリア（アンサー表示と棒人間） */
    .display-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(0, 162, 255, 0.2);
      border-radius: 4px;
      padding: 5px 15px;
    }

    /* デジタル文字表示 */
    .status-monitor {
      display: flex;
      flex-direction: column;
      gap: 5px;
      width: 55%;
    }
    .monitor-row {
      font-size: 0.75rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .monitor-row span {
      color: #fff;
      font-weight: bold;
    }
    .action-result {
      font-size: 1.4rem;
      font-weight: bold;
      color: var(--active-color);
      text-shadow: 0 0 10px var(--active-color);
      margin-top: 2px;
    }

    /* 右側：アンサーを視覚化する棒人間グラフィック（SVG） */
    .avatar-container {
      width: 100px;
      height: 100px;
      background: #000;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: inset 0 0 10px rgba(0,162,255,0.3);
    }

    .stickman {
      width: 100%;
      height: 100%;
    }
    .stickman line, .stickman circle, .stickman path {
      stroke: var(--border-color);
      stroke-width: 4;
      fill: none;
      stroke-linecap: round;
      transition: all 0.2s ease; /* 手がシュバッと動くアニメーション */
    }
    /* ロックオン時のアバター発光 */
    .stickman .active-part {
      stroke: var(--active-color);
      filter: drop-shadow(0px 0px 3px var(--active-color));
    }
  </style>
</head>
<body>

  <div class="camera-container">
    <video id="camera-video" autoplay playsinline muted></video>
    
    <div class="scan-overlay">
      <div class="scan-box-rule"></div>
      <div id="target-scan-box" class="scan-box-player pos-spade"></div>
    </div>
  </div>

  <div class="control-panel">
    <div class="panel-header">
      <div class="panel-title">AI FLAG ASSIST SYSTEM v1.0</div>
      <div style="font-size:0.7rem; color:var(--active-color);">● ONLINE</div>
    </div>

    <div style="font-size: 0.75rem; color: var(--text-muted);">[1] PLAYER LOCKON SELECT</div>
    <div class="player-selector">
      <button class="player-btn" id="btn-clover" onclick="selectPlayer('clover')">♣ CLOVER (左)</button>
      <button class="player-btn active" id="btn-spade" onclick="selectPlayer('spade')">♠ SPADE (中)</button>
      <button class="player-btn" id="btn-heart" onclick="selectPlayer('heart')">♥ HEART (右)</button>
    </div>

    <div style="font-size: 0.75rem; color: var(--text-muted);">[2] MOTION MIRROR MONITOR</div>
    <div class="display-area">
      
      <div class="status-monitor">
        <div class="monitor-row">RULE: <span id="log-rule">大きい方下げ、小さい方上げ</span></div>
        <div class="monitor-row">DATA: <span id="log-data">L:315÷7(45) | R:12×4(48)</span></div>
        <div class="action-result" id="log-action">◀ LEFT RAISE / RIGHT DOWN ▶</div>
      </div>

      <div class="avatar-container">
        <svg class="stickman" viewBox="0 0 100 100">
          <line x1="50" y1="45" x2="50" y2="75" />
          <line x1="50" y1="75" x2="35" y2="95" />
          <line x1="50" y1="75" x2="65" y2="95" />
          <circle cx="50" cy="30" r="10" />
          
          <line id="left-arm-prox" x1="50" y1="45" x2="35" y2="35" class="active-part" />
          <line id="left-arm-dist" x1="35" y1="35" x2="25" y2="20" class="active-part" />
          
          <line id="right-arm-prox" x1="50" y1="45" x2="65" y2="52" />
          <line id="right-arm-dist" x1="65" y1="52" x2="75" y2="60" />
        </svg>
      </div>

    </div>
  </div>

  <script>
    // カメラ起動処理
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } },
          audio: false
        });
        document.getElementById('camera-video').srcObject = stream;
      } catch (err) {
        console.error("Camera error:", err);
        // PCブラウザ等のテスト用にダミー表示
      }
    }

    // プレイヤーの選択と、それに連動した枠の移動処理
    function selectPlayer(type) {
      // ボタンの見た目切り替え
      document.querySelectorAll('.player-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`btn-${type}`).classList.add('active');

      // スキャン枠のクラスを変更して、対象プレイヤーの位置へシュッと移動させる
      const scanBox = document.getElementById('target-scan-box');
      scanBox.className = 'scan-box-player'; // 一度クリア
      
      if (type === 'clover') {
        scanBox.classList.add('pos-clover');
        // テスト用のダミー挙動切り替え（左プレイヤーの時のポーズ）
        setStickmanPose('down', 'up'); 
        updateTexts("素数だけ下げる", "L:25 | R:23", "LEFT DOWN / RIGHT RAISE");
      } else if (type === 'spade') {
        scanBox.classList.add('pos-spade');
        // 中央プレイヤーの時のポーズ
        setStickmanPose('up', 'down');
        updateTexts("大きい方下げ、小さい方上げ", "L:315÷7(45) | R:12×4(48)", "LEFT RAISE / RIGHT DOWN");
      } else if (type === 'heart') {
        scanBox.classList.add('pos-heart');
        // 右プレイヤーの時のポーズ
        setStickmanPose('down', 'down');
        updateTexts("37の倍数だけ下げる", "L:1468 | R:222", "BOTH DOWN (両手下げ)");
      }
    }

    // スマホ内の棒人間のポーズをプログラムで制御する関数
    function setStickmanPose(leftPose, rightPose) {
      const lProx = document.getElementById('left-arm-prox');
      const lDist = document.getElementById('left-arm-dist');
      const rProx = document.getElementById('right-arm-prox');
      const rDist = document.getElementById('right-arm-dist');

      // 左腕の変形
      if (leftPose === 'up') {
        lProx.setAttribute('x2', '35'); lProx.setAttribute('y2', '35');
        lDist.setAttribute('x1', '35'); lDist.setAttribute('y1', '35');
        lDist.setAttribute('x2', '25'); lDist.setAttribute('y2', '20');
        lProx.classList.add('active-part'); lDist.classList.add('active-part');
      } else { // down
        lProx.setAttribute('x2', '35'); lProx.setAttribute('y2', '52');
        lDist.setAttribute('x1', '35'); lDist.setAttribute('y1', '52');
        lDist.setAttribute('x2', '25'); lDist.setAttribute('y2', '60');
        lProx.classList.remove('active-part'); lDist.classList.remove('active-part');
      }

      // 右腕の変形
      if (rightPose === 'up') {
        rProx.setAttribute('x2', '65'); rProx.setAttribute('y2', '35');
        rDist.setAttribute('x1', '65'); rDist.setAttribute('y1', '35');
        rDist.setAttribute('x2', '75'); rDist.setAttribute('y2', '20');
        rProx.classList.add('active-part'); rDist.classList.add('active-part');
      } else { // down
        rProx.setAttribute('x2', '65'); rProx.setAttribute('y2', '52');
        rDist.setAttribute('x1', '65'); rDist.setAttribute('y1', '52');
        rDist.setAttribute('x2', '75'); rDist.setAttribute('y2', '60');
        rProx.classList.remove('active-part'); rDist.classList.remove('active-part');
      }
    }

    function updateTexts(rule, data, action) {
      document.getElementById('log-rule').textContent = rule;
      document.getElementById('log-data').textContent = data;
      document.getElementById('log-action').textContent = action;
    }

    // 起動
    startCamera();
  </script>
</body>
</html>
